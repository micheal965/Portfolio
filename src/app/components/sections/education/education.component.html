<app-main-section title="Academic Background">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8" education>
        <div [appScrollTrigger]="'animate-slide-right'" class="lg:col-span-5 space-y-6 opacity-0">
            <div
                class="bg-slate-600/5 border border-white/10 hover:border-skyBlue/40 hover:shadow-xl hover:shadow-skyBlue/30 backdrop-blur-md p-8 rounded-3xl relative overflow-hidden group">
                <div
                    class="absolute -top-10 -right-10 w-32 h-32 bg-skyBlue blur-[80px] opacity-20 group-hover:opacity-40 transition-opacity duration-300">
                </div>

                <div class="bg-skyBlue/20 p-4 rounded-2xl w-fit mb-6">
                    <svg class="w-8 h-8 text-skyBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 14l9-5-9-5-9 5 9 5z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                    </svg>
                </div>

                <h3 class="text-2xl font-bold text-white mb-2 leading-tight">Bachelor’s in Computer Science</h3>
                <p class="text-skyBlue font-medium text-lg mb-6">Helwan University</p>

                <div class="space-y-4">
                    <div class="flex items-center gap-3 text-gray-400">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="4" width="18" height="18" rx="2" stroke="#2d82b7" stroke-width="1.5" />
                            <path d="M16 2V6M8 2V6" stroke="#2d82b7" stroke-width="1.5" stroke-linecap="round" />
                            <path d="M3 10H21" stroke="#2d82b7" stroke-width="1.5" />
                        </svg>
                        <span class="text-white">2022 — 2026 (Expected)</span>
                    </div>
                    <div class="flex items-center gap-3 text-gray-400">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z"
                                stroke="#2d82b7" stroke-width="1.5" />
                            <path
                                d="M12 22C16 18 20 14.4183 20 10C20 5.58172 16.4183 2 12 2C7.58172 2 4 5.58172 4 10C4 14.4183 8 18 12 22Z"
                                stroke="#2d82b7" stroke-width="1.5" />
                        </svg>
                        <span class="text-white">Cairo, Egypt</span>
                    </div>
                </div>
            </div>
        </div>

        <div [appScrollTrigger]="'animate-slide-left'" class="lg:col-span-7 z-10 opacity-0 [animation-delay:0.4s] ">
            <h4 class="text-gray-400 text-sm font-bold uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-azureBlue"></span>
                Core Specializations
            </h4>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                @for (course of coursework; track course) {
                <div
                    class="flex items-center gap-4 bg-white/5 border border-white/5 p-4 rounded-xl hover:bg-white/10 hover:translate-x-1 transition-all">
                    <div class="w-2 h-2 rounded-full bg-sky-400 "></div>
                    <span class="text-gray-200 font-medium">{{ course }}</span>
                </div>
                }
            </div>
        </div>
    </div>
</app-main-section>
