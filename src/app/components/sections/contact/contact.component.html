<section class="max-w-full mx-auto relative z-10 py-10">
    <div [appScrollTrigger]="'animate-slideDown'"
        class="opacity-0 relative flex items-center justify-center gap-4 mb-16 mt-10">
        <h2 class="title text-white">Get In Touch</h2>
        <div class="title-line bg-skyBlue"></div>
    </div>

    <div
        class="max-w-3xl mx-auto text-center border border-skyBlue/30 rounded-3xl overflow-hidden backdrop-blur-md bg-gray-900/40 shadow-[0_0_30px_rgba(66,226,184,0.2)]">

        <div class="p-8 md:p-12">
            <p class="text-gray-300 mb-10 leading-relaxed text-lg">
                I'm always open to discussing new projects, creative ideas, or opportunities to be part of your vision.
            </p>

            <div class="grid grid-cols-1 gap-4 mb-10">
                <div
                    class="flex items-center gap-4 p-4 bg-gray-900/60 border border-gray-800 rounded-2xl hover:border-blue-500 transition-all text-left group cursor-pointer">
                    <div
                        class="p-3 bg-skyBlue/10 rounded-xl text-blue-500 group-hover:bg-skyBlue group-hover:text-gray-900 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-white font-bold text-lg">Email</p>
                        <p class="text-gray-400 text-sm">contact.elbanagmail.com</p>
                    </div>
                </div>

                <div
                    class="flex items-center gap-4 p-4 bg-gray-900/60 border border-gray-800 rounded-2xl hover:border-blue-500 transition-all text-left group cursor-pointer">
                    <div
                        class="p-3 bg-blue-500/10 rounded-xl text-blue-400 group-hover:bg-blue-500 group-hover:text-white transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-white font-bold text-lg">LinkedIn</p>
                        <p class="text-gray-400 text-sm">Micheal ghobrial</p>
                    </div>
                </div>
            </div>

            <button
                class="w-full py-4 bg-skyBlue hover:bg-[#36c9a3] text-gray-900 font-extrabold rounded-xl flex items-center justify-center gap-2 transition-all shadow-[0_10px_20px_rgba(66,226,184,0.3)] active:scale-[0.98]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download My CV
            </button>
        </div>
    </div>
</section>
